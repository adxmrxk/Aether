name: dbt Transformation Pipeline

on:
  # Run on push to main
  push:
    branches: [main]
    paths:
      - 'dbt/**'

  # Run on schedule (every hour)
  schedule:
    - cron: '0 * * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run with --full-refresh flag'
        required: false
        default: 'false'
        type: boolean

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  DBT_PROFILES_DIR: ${{ github.workspace }}/dbt

jobs:
  dbt-run:
    name: Run dbt Transformations
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # For Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: dbt/requirements.txt

      - name: Install dbt dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-bigquery

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Validate dbt project
        working-directory: dbt
        run: dbt debug

      - name: Run dbt models
        working-directory: dbt
        run: |
          if [ "${{ github.event.inputs.full_refresh }}" == "true" ]; then
            dbt run --full-refresh
          else
            dbt run
          fi

      - name: Run dbt tests
        working-directory: dbt
        run: dbt test

      - name: Generate dbt docs
        working-directory: dbt
        run: dbt docs generate

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt/target/manifest.json
            dbt/target/run_results.json
            dbt/target/catalog.json
          retention-days: 7

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [dbt-run]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "dbt pipeline failed! Check the workflow logs."
          # Add Slack/email notification here if needed
