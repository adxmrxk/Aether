# dbt Profile Configuration for AetherFlow
# Copy this to ~/.dbt/profiles.yml or set DBT_PROFILES_DIR

aether:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth  # Use 'service-account' for CI/CD
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: aether_lakehouse
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: aether_lakehouse
      location: US
      threads: 8
      timeout_seconds: 600
      priority: batch
      retries: 3
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
